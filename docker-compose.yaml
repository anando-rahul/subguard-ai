name: subguard-ai

x-app: &app
  build:
    context: .
  image: subguard-ai-app

services:
  postgres:
    image: postgres:16-alpine
    container_name: subguard-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: subguardai
      POSTGRES_PASSWORD: sub1234
      POSTGRES_DB: subguard_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subguardai -d subguard_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: subguard-ai-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    <<: *app
    container_name: subguard-ai-api
    restart: unless-stopped
    environment:
      API_PORT: "${API_PORT:-8000}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-dev-change-me}"
      BETTER_AUTH_URL: "${BETTER_AUTH_URL:-http://localhost:8000}"
      CLIENT_ORIGINS: "${CLIENT_ORIGINS:-http://localhost:3000,http://localhost:4000}"
      DATABASE_URL: "${DOCKER_DATABASE_URL:-postgresql://subguardai:sub1234@postgres:5432/subguard_ai?schema=public}"
      ENABLE_TELEMETRY: "${ENABLE_TELEMETRY:-false}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      REDIS_URL: "${DOCKER_REDIS_URL:-redis://redis:6379}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
      S3_BUCKET: "${S3_BUCKET:-}"
      S3_ENDPOINT: "${S3_ENDPOINT:-}"
      S3_FORCE_PATH_STYLE: "${S3_FORCE_PATH_STYLE:-true}"
      S3_PUBLIC_BASE_URL: "${S3_PUBLIC_BASE_URL:-}"
      S3_REGION: "${S3_REGION:-auto}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
      TELEMETRY_API_KEY: "${TELEMETRY_API_KEY:-}"
      TELEMETRY_API_KEY_HEADER: "${TELEMETRY_API_KEY_HEADER:-authorization}"
      TELEMETRY_EXPORTER: "${TELEMETRY_EXPORTER:-console}"
      TELEMETRY_EXPORTER_OTLP_ENDPOINT: "${TELEMETRY_EXPORTER_OTLP_ENDPOINT:-}"
      TELEMETRY_SERVICE_NAMESPACE: "${TELEMETRY_SERVICE_NAMESPACE:-subguard-ai}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENROUTER_MODEL: "${OPENROUTER_MODEL:-openrouter/free}"
      OPENROUTER_MAX_TOKENS: "${OPENROUTER_MAX_TOKENS:-1000}"
      OPENROUTER_TEMPERATURE: "${OPENROUTER_TEMPERATURE:-0.7}"
      OPENROUTER_TIMEOUT_MS: "${OPENROUTER_TIMEOUT_MS:-60000}"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "pnpm db:push && pnpm --filter @repo/api start"

  platform:
    <<: *app
    image: subguard-ai-app
    container_name: subguard-ai-platform
    restart: unless-stopped
    environment:
      VITE_API_URL: "${VITE_API_URL:-http://localhost:8000}"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started
    command: pnpm --filter @repo/platform dev

  admin:
    <<: *app
    image: subguard-ai-app
    container_name: subguard-ai-admin
    restart: unless-stopped
    environment:
      VITE_API_URL: "${VITE_API_URL:-http://localhost:8000}"
    ports:
      - "4000:4000"
    depends_on:
      api:
        condition: service_started
    command: pnpm --filter @repo/admin dev

  worker:
    <<: *app
    image: subguard-ai-app
    container_name: subguard-ai-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: "${DOCKER_DATABASE_URL:-postgresql://subguardai:sub1234@postgres:5432/subguard_ai?schema=public}"
      ENABLE_TELEMETRY: "${ENABLE_TELEMETRY:-false}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      REDIS_URL: "${DOCKER_REDIS_URL:-redis://redis:6379}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
      S3_BUCKET: "${S3_BUCKET:-}"
      S3_ENDPOINT: "${S3_ENDPOINT:-}"
      S3_FORCE_PATH_STYLE: "${S3_FORCE_PATH_STYLE:-true}"
      S3_PUBLIC_BASE_URL: "${S3_PUBLIC_BASE_URL:-}"
      S3_REGION: "${S3_REGION:-auto}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
      TELEMETRY_API_KEY: "${TELEMETRY_API_KEY:-}"
      TELEMETRY_API_KEY_HEADER: "${TELEMETRY_API_KEY_HEADER:-authorization}"
      TELEMETRY_EXPORTER: "${TELEMETRY_EXPORTER:-console}"
      TELEMETRY_EXPORTER_OTLP_ENDPOINT: "${TELEMETRY_EXPORTER_OTLP_ENDPOINT:-}"
      TELEMETRY_SERVICE_NAMESPACE: "${TELEMETRY_SERVICE_NAMESPACE:-subguard-ai}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENROUTER_MODEL: "${OPENROUTER_MODEL:-openrouter/free}"
      OPENROUTER_MAX_TOKENS: "${OPENROUTER_MAX_TOKENS:-1000}"
      OPENROUTER_TEMPERATURE: "${OPENROUTER_TEMPERATURE:-0.7}"
      OPENROUTER_TIMEOUT_MS: "${OPENROUTER_TIMEOUT_MS:-60000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pnpm --filter @repo/worker start

  caddy:
    image: caddy:2-alpine
    container_name: subguard-ai-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - platform
      - admin
      - api

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
